<style>
body{

header{

.producto{

<body>

<header>
<h1>ROPA DE MARCA</h1>
<p>Tu tienda online</p>
</header>

<div class="container">

<h2>Subir productos</h2>

<input type="file" id="imagen">
<br><br>
<input type="text" id="precio" placeholder="Precio">
<br><br>
<input type="text" id="nicho" placeholder="Ej: zapatos, ropa">
<br><br>
<button onclick="agregarProducto()">Agregar producto</button>

<hr>

<h2>Productos</h2>

<div id="productos"></div>

<hr>

<h2>Concepto (máx 1500 letras)</h2>
<textarea id="concepto" maxlength="1500" rows="6" cols="40"></textarea>

</div>

<script>
function agregarProducto(){
    let archivo = document.getElementById("imagen").files[0];
    let precio = document.getElementById("precio").value;
    let nicho = document.getElementById("nicho").value;

    if(!archivo){
        alert("Sube una imagen");
        return;
    }

    let reader = new FileReader();

    reader.onload = function(e){
        let div = document.createElement("div");
        div.className = "producto";

        div.innerHTML = `
            <img src="${e.target.result}">
            <p>$${precio}</p>
            <p>${nicho}</p>
        `;

        document.getElementById("productos").appendChild(div);
    }

    reader.readAsDataURL(archivo);
}
</script>

</body>
